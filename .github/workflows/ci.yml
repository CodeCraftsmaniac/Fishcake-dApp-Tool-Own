name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript compile check
        run: npm run build

      - name: Run lint (if exists)
        run: npm run lint --if-present

  # Web-App CI
  webapp-ci:
    name: Web-App CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web-App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint check
        run: npx next lint --no-error-on-unresolved-pattern 2>/dev/null || true

      - name: TypeScript compile check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  # CLI App CI
  cli-ci:
    name: CLI App CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CLI-App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript compile check
        run: npm run build

  # Deploy Backend to Oracle VM (only on main branch push)
  deploy-backend:
    name: Deploy Backend to Oracle VM
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            # --- First-time VM provisioning ---
            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 20..."
              curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
              sudo dnf install -y nodejs
            fi

            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              sudo npm install -g pm2
            fi

            if ! command -v git &> /dev/null; then
              echo "Installing git..."
              sudo dnf install -y git
            fi

            # --- Clone or update repo ---
            if [ ! -d ~/fishcake-backend/.git ]; then
              echo "Cloning repository..."
              git clone https://github.com/CodeCraftsmaniac/Fishcake-dApp-Tool-Own.git ~/fishcake-backend
            fi

            cd ~/fishcake-backend

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # --- Create .env if missing ---
            if [ ! -f backend/.env ]; then
              echo "Creating backend .env from example..."
              cp backend/.env.example backend/.env
              echo ""
              echo "⚠️  IMPORTANT: Edit backend/.env with real values:"
              echo "  vi ~/fishcake-backend/backend/.env"
            fi

            # --- Install, build, and restart ---
            cd backend
            echo "Installing dependencies..."
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev
            echo "Building..."
            npm run build
            echo "Restarting PM2..."
            pm2 restart fishcake-backend 2>/dev/null || pm2 start dist/serverSupabase.js --name fishcake-backend
            pm2 save

            # --- Ensure PM2 starts on boot ---
            pm2 startup 2>/dev/null | grep -o 'sudo .*' | bash 2>/dev/null || true

            echo "✅ Deploy complete!"
            pm2 status

  # Summary
  ci-summary:
    name: CI Summary
    needs: [backend-ci, webapp-ci, cli-ci]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Backend CI: ${{ needs.backend-ci.result }}"
          echo "Web-App CI: ${{ needs.webapp-ci.result }}"
          echo "CLI CI: ${{ needs.cli-ci.result }}"
          if [[ "${{ needs.backend-ci.result }}" == "failure" || "${{ needs.webapp-ci.result }}" == "failure" || "${{ needs.cli-ci.result }}" == "failure" ]]; then
            echo "❌ Some CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
