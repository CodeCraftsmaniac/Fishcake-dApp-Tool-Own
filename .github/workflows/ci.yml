name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript compile check
        run: npm run build

      - name: Run lint (if exists)
        run: npm run lint --if-present

  # Web-App CI
  webapp-ci:
    name: Web-App CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web-App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint check
        run: npx next lint --no-error-on-unresolved-pattern 2>/dev/null || true

      - name: TypeScript compile check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  # Deploy Backend to Oracle VM (only on main branch push)
  deploy-backend:
    name: Deploy Backend to Oracle VM
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
      VM_USER: ${{ secrets.ORACLE_VM_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build backend (in CI - fast)
        working-directory: backend
        run: |
          npm install
          npm run build
          npm prune --omit=dev

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << SSHCONFIG
          Host $VM_HOST
            IdentityFile ~/.ssh/deploy_key
            User $VM_USER
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHCONFIG

      - name: Provision VM (first-time only)
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 $VM_USER@$VM_HOST << 'PROVISION'
            set -e
            # Install Node.js if missing
            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 20..."
              curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
              sudo dnf install -y nodejs
            fi
            # Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              sudo npm install -g pm2
              pm2 startup 2>/dev/null | grep -o 'sudo .*' | bash 2>/dev/null || true
            fi
            # Create app directory
            mkdir -p ~/fishcake-backend/backend/dist ~/fishcake-backend/backend/node_modules
            echo "Provisioning done"
          PROVISION

      - name: Create .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key $VM_USER@$VM_HOST << ENVFILE
            cat > ~/fishcake-backend/backend/.env << 'EOF'
            FRONTEND_URLS=${{ secrets.FRONTEND_URLS }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=3001
            RPC_ALCHEMY=${{ secrets.RPC_ALCHEMY }}
            RPC_ANKR=${{ secrets.RPC_ANKR }}
            RPC_BLOCKPI=${{ secrets.RPC_BLOCKPI }}
            RPC_DRPC=${{ secrets.RPC_DRPC }}
            RPC_LLAMARPC=${{ secrets.RPC_LLAMARPC }}
            RPC_PUBLICNODE=${{ secrets.RPC_PUBLICNODE }}
            SCHEDULER_ENABLED=${{ secrets.SCHEDULER_ENABLED }}
            SCHEDULER_INTERVAL_MS=${{ secrets.SCHEDULER_INTERVAL_MS }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            EOF
          ENVFILE

      - name: Rsync built backend to VM
        run: |
          rsync -az --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/dist/ $VM_USER@$VM_HOST:~/fishcake-backend/backend/dist/
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/node_modules/ $VM_USER@$VM_HOST:~/fishcake-backend/backend/node_modules/
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/package.json ecosystem.config.js \
            $VM_USER@$VM_HOST:~/fishcake-backend/

      - name: Start/Restart backend via PM2
        run: |
          ssh -i ~/.ssh/deploy_key $VM_USER@$VM_HOST << 'START'
            cd ~/fishcake-backend
            pm2 restart fishcake-backend 2>/dev/null || \
              pm2 start backend/dist/server.js --name fishcake-backend
            pm2 save
            pm2 status
          START

  # Summary
  ci-summary:
    name: CI Summary
    needs: [backend-ci, webapp-ci]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Backend CI: ${{ needs.backend-ci.result }}"
          echo "Web-App CI: ${{ needs.webapp-ci.result }}"
          if [[ "${{ needs.backend-ci.result }}" == "failure" || "${{ needs.webapp-ci.result }}" == "failure" ]]; then
            echo "❌ Some CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
